name: Run Tests

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d target/surefire-reports ]; then
            TEST_FILES=$(find target/surefire-reports -name "TEST-*.xml" | wc -l)
            if [ $TEST_FILES -gt 0 ]; then
              echo "✅ Tests executed successfully!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              # Parse test results from XML
              TOTAL_TESTS=$(grep -r 'tests="' target/surefire-reports/TEST-*.xml | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
              FAILURES=$(grep -r 'failures="' target/surefire-reports/TEST-*.xml | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
              ERRORS=$(grep -r 'errors="' target/surefire-reports/TEST-*.xml | sed 's/.*errors="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
              SKIPPED=$(grep -r 'skipped="' target/surefire-reports/TEST-*.xml | sed 's/.*skipped="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
              
              echo "- **Total Tests:** $TOTAL_TESTS" >> $GITHUB_STEP_SUMMARY
              echo "- **Failures:** $FAILURES" >> $GITHUB_STEP_SUMMARY
              echo "- **Errors:** $ERRORS" >> $GITHUB_STEP_SUMMARY
              echo "- **Skipped:** $SKIPPED" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "📦 Detailed test reports are available in the artifacts." >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Test reports directory not found" >> $GITHUB_STEP_SUMMARY
          fi
